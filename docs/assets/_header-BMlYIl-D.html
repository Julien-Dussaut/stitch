        <g transform="translate(50,50) rotate(-40) translate(-50,-50)">
          <rect x="46.5" y="8" width="7" height="58" rx="3.5" fill="none" stroke="var(--st-color-text)"

          <polygon points="50,2 46.5,9 53.5,9" fill="var(--st-color-text)" />
          <ellipse cx="50" cy="60" rx="5" ry="3.5" fill="none" stroke="var(--st-color-text)" stroke-width="2" />
        </g>

        <path d="M 62 64
